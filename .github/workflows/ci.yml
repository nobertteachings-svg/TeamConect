name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  lint-unit-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
          NEXTAUTH_SECRET: ci-build-placeholder-secret-32chars-min
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

  integration-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teamconnect_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d teamconnect_ci"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teamconnect_ci?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/teamconnect_ci?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret-32-characters-minimum
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Migrate database
        run: npx prisma migrate deploy

      - name: Integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Start app and run E2E
        run: |
          npm run start &
          SERVER_PID=$!
          echo "Waiting for /api/health ..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Server ready"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server exited early"
              exit 1
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3000/api/health >/dev/null || { echo "Health check failed"; exit 1; }
          E2E_SKIP_SERVER=1 E2E_BASE_URL=http://127.0.0.1:3000 npm run test:e2e
          kill $SERVER_PID || true
